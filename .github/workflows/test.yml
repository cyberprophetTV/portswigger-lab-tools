name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Match the README's "Python 3.10+" requirement.
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        # requests for the actual tools, rich+questionary for the
        # launcher, pytest for the suite.
        run: pip install requests pytest rich questionary

      - name: Run tests
        run: pytest tests/ -v

      - name: Smoke-test --help on every script
        run: |
          python3 username_enum_solver.py --help > /dev/null
          python3 intruder.py --help > /dev/null
          python3 subtle_response_solver.py --help > /dev/null
          python3 timing_attack_solver.py --help > /dev/null
          python3 dirbuster.py --help > /dev/null
          python3 param_miner.py --help > /dev/null
          python3 jwt_tool.py --help > /dev/null
          python3 jwt_tool.py decode --help > /dev/null
          python3 security_audit.py --help > /dev/null
          python3 privesc.py --help > /dev/null
          python3 decode_tool.py --help > /dev/null
          python3 decode_tool.py url --help > /dev/null
          python3 oast_poll.py --help > /dev/null

      - name: Smoke-test lab_tools imports
        # Can't actually run lab_tools in CI (interactive prompts),
        # but importing it catches any syntax / dataclass errors.
        run: python3 -c "import lab_tools; assert lab_tools.TOOLS"
