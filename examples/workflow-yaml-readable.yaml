# YAML workflow example - same semantics as JSON, way easier to
# hand-edit. Requires `pip install pyyaml`.
#
# Why YAML?
#   - Comments are supported (# like this line) - JSON has none.
#   - No quoting on most keys.
#   - Block strings for long bodies without escape hell.
#   - The same workflow as workflow-include-shared-auth.json but
#     more readable.

vars:
  base_url: https://YOUR-LAB-ID.web-security-academy.net
  user: wiener
  pass: peter

steps:
  # Login + grab CSRF token. Inlined here instead of via include
  # so this file is fully self-contained for the YAML demo.
  - name: login
    request:
      method: POST
      url: "{{base_url}}/login"
      headers:
        Content-Type: application/x-www-form-urlencoded
      body: "username={{user}}&password={{pass}}"

  - name: grab_csrf
    request:
      method: GET
      url: "{{base_url}}/my-account"
    extract:
      csrf:
        regex: 'name="csrf" value="([^"]+)"'

  # Conditional: only fuzz when we actually captured the CSRF.
  # Saves us from sending nonsense requests if the lab changed
  # its markup.
  - name: fuzz_email_change
    if: "{{csrf}}"
    request:
      method: POST
      url: "{{base_url}}/my-account/change-email"
      headers:
        Content-Type: application/x-www-form-urlencoded
      body: "csrf={{csrf}}&email=§EMAIL§"
    fuzz:
      payload: usernames.txt
      match_status: "200"
      workers: 5
